<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Logs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 10px;
        }
        
        h1 {
            color: #fff;
            font-size: 24px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .btn {
            padding: 8px 16px;
            background: #4a9eff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover {
            background: #3a8eef;
        }
        
        .btn-secondary {
            background: #666;
        }
        
        .btn-secondary:hover {
            background: #555;
        }
        
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            font-size: 14px;
        }
        
        .auto-refresh input {
            width: 18px;
            height: 18px;
        }
        
        .logs-container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .log-line {
            margin-bottom: 2px;
        }
        
        .log-error {
            color: #ff6b6b;
        }
        
        .log-warning {
            color: #ffd93d;
        }
        
        .log-success {
            color: #6bcf7f;
        }
        
        .log-info {
            color: #4a9eff;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        
        .back-link {
            margin-top: 15px;
        }
        
        .back-link a {
            color: #4a9eff;
            text-decoration: none;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Bot Logs</h1>
            <div class="controls">
                <div class="auto-refresh">
                    <input type="checkbox" id="auto-refresh-checkbox" checked>
                    <label for="auto-refresh-checkbox">Auto-refresh</label>
                </div>
                <button id="refresh-btn" class="btn">Refresh</button>
                <a href="/" class="btn btn-secondary">Back to Dashboard</a>
            </div>
        </div>
        
        <div id="logs-container" class="logs-container">
            <div class="loading">Loading logs...</div>
        </div>
        
        <div class="back-link">
            <a href="/">← Back to Dashboard</a>
        </div>
    </div>
    
    <script>
        let autoRefreshInterval = null;
        
        function colorizeLog(line) {
            const text = line.textContent || line.innerText || '';
            const lowerText = text.toLowerCase();
            if (lowerText.includes('error') || lowerText.includes('❌') || lowerText.includes('failed') || lowerText.includes('exception') || lowerText.includes('traceback')) {
                line.className = 'log-line log-error';
            } else if (lowerText.includes('warning') || lowerText.includes('⚠️') || lowerText.includes('401') || lowerText.includes('token expired')) {
                line.className = 'log-line log-warning';
            } else if (lowerText.includes('✅') || lowerText.includes('success') || lowerText.includes('started') || lowerText.includes('active')) {
                line.className = 'log-line log-success';
            } else if (lowerText.includes('info') || lowerText.includes('📊') || lowerText.includes('📱') || lowerText.includes('monitoring')) {
                line.className = 'log-line log-info';
            } else {
                line.className = 'log-line';
            }
        }
        
        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                
                const container = document.getElementById('logs-container');
                
                if (data.logs && data.logs.length > 0) {
                    container.innerHTML = '';
                    data.logs.forEach(log => {
                        const line = document.createElement('div');
                        line.textContent = log;
                        colorizeLog(line);
                        container.appendChild(line);
                    });
                    // Scroll to bottom
                    container.scrollTop = container.scrollHeight;
                } else {
                    container.innerHTML = '<div class="loading">No logs available</div>';
                }
            } catch (error) {
                console.error('Error fetching logs:', error);
                document.getElementById('logs-container').innerHTML = 
                    '<div class="log-error">Error loading logs. Make sure the bot is running.</div>';
            }
        }
        
        document.getElementById('refresh-btn').addEventListener('click', () => {
            fetchLogs();
        });
        
        document.getElementById('auto-refresh-checkbox').addEventListener('change', (e) => {
            if (e.target.checked) {
                autoRefreshInterval = setInterval(fetchLogs, 2000); // Refresh every 2 seconds
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
            }
        });
        
        // Initial load
        fetchLogs();
        
        // Start auto-refresh if enabled
        if (document.getElementById('auto-refresh-checkbox').checked) {
            autoRefreshInterval = setInterval(fetchLogs, 2000);
        }
    </script>
</body>
</html>
